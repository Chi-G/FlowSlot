name: Deploy to WhoGoHost

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, gd
        coverage: none

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM Dependencies & Build
      env:
        VITE_PUSHER_APP_KEY: ${{ secrets.PUSHER_APP_KEY }}
        VITE_PUSHER_APP_CLUSTER: ${{ secrets.PUSHER_APP_CLUSTER }}
      run: |
        npm install
        npm run build

    - name: Pre-Deployment Cleanup
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 10m
        script: |
          cd /home/forahiao/public_html/flowslot.forahia.org.ng
          # 1. EMERGENCY CLEANUP: Remove vendor to free up ~100MB+ for sync
          rm -rf vendor
          # Remove logs and cache to free up space
          rm -rf storage/logs/*.log
          rm -rf storage/framework/cache/data/*
          rm -rf storage/framework/views/*.php
          rm -rf storage/framework/sessions/*
          rm -rf bootstrap/cache/*.php
          # Remove old builds (to prevent accumulating hashed files)
          rm -rf public/build
          # Remove accidental node_modules if they were synced previously
          rm -rf node_modules

    - name: Sync Files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: ".,!node_modules,!.git,!.github,!.env"
        target: "/home/forahiao/public_html/flowslot.forahia.org.ng"
        strip_components: 0
        rm: false
        timeout: 10m

    - name: Post-Deployment Commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/forahiao/public_html/flowslot.forahia.org.ng

          # 1. Directory Setup & Permissions
          echo "Initializing directories & granting full write access..."
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p bootstrap/cache
          chmod -R 777 storage bootstrap/cache
          
          # 2. Database & Optimization
          echo "Running migrations and optimization..."
          # Bypass system temp directory for PHP
          export TMPDIR=$(pwd)/storage/framework/cache
          
          # Clear caches first to free memory
          php artisan config:clear
          php artisan cache:clear
          
          # Run migration and seeding with increased memory limit
          php -d memory_limit=512M artisan migrate --seed --force
          
          # Re-cache for performance
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
