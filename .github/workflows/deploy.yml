name: Deploy to WhoGoHost

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, gd
        coverage: none

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM Dependencies & Build
      env:
        VITE_PUSHER_APP_KEY: ${{ secrets.PUSHER_APP_KEY }}
        VITE_PUSHER_APP_CLUSTER: ${{ secrets.PUSHER_APP_CLUSTER }}
      run: |
        npm install
        npm run build

    - name: Pre-Deployment Cleanup
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 10m
        script: |
          cd /home/forahiao/public_html/flowslot.forahia.org.ng
          # Remove logs and cache to free up space
          rm -rf storage/logs/*.log
          rm -rf storage/framework/cache/data/*
          rm -rf bootstrap/cache/*.php
          # Remove accidental node_modules if they were synced previously
          rm -rf node_modules

    - name: Sync Files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: ".,!node_modules,!vendor,!.git,!.github,!.env"
        target: "/home/forahiao/public_html/flowslot.forahia.org.ng"
        strip_components: 0
        rm: false
        timeout: 10m

    - name: Post-Deployment Commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 15m
        envs: PUSHER_APP_ID,PUSHER_APP_KEY,PUSHER_APP_SECRET,PUSHER_APP_CLUSTER,DB_DATABASE
        script: |
          cd /home/forahiao/public_html/flowslot.forahia.org.ng
          
          # 1. Diagnostics (Safe: only checks existence/keys, not values)
          echo "Checking environment status..."
          if [ ! -f .env ]; then
            echo "::warning ::.env file NOT FOUND on server!"
            # Optionally create a skeleton if it's missing, but safer for user to do it
          else
            echo "Found .env file."
            grep -q "DB_DATABASE" .env && echo "DB_DATABASE key found." || echo "::warning ::DB_DATABASE key MISSING in .env"
            grep -q "DB_DATABASE=" .env && [ -z "$(grep "^DB_DATABASE=" .env | cut -d'=' -f2)" ] && echo "::warning ::DB_DATABASE is EMPTY in .env"
          fi
          
          # 2. Install Composer Dependencies on server
          composer install --no-dev --optimize-autoloader --no-interaction --no-progress
          
          # 3. Inject Pusher secrets into .env if they don't exist
          [ -f .env ] && grep -q "PUSHER_APP_ID" .env || echo "PUSHER_APP_ID=$PUSHER_APP_ID" >> .env
          [ -f .env ] && grep -q "PUSHER_APP_KEY" .env || echo "PUSHER_APP_KEY=$PUSHER_APP_KEY" >> .env
          [ -f .env ] && grep -q "PUSHER_APP_SECRET" .env || echo "PUSHER_APP_SECRET=$PUSHER_APP_SECRET" >> .env
          [ -f .env ] && grep -q "PUSHER_APP_CLUSTER" .env || echo "PUSHER_APP_CLUSTER=$PUSHER_APP_CLUSTER" >> .env
          
          # 4. Update values using sed only if secrets/variables are NOT empty
          sed -i "s/^BROADCAST_CONNECTION=.*/BROADCAST_CONNECTION=pusher/" .env
          
          if [ ! -z "$PUSHER_APP_CLUSTER" ]; then
            sed -i "s/^PUSHER_APP_CLUSTER=.*/PUSHER_APP_CLUSTER=\"$PUSHER_APP_CLUSTER\"/" .env
          fi
          
          # Only update DB_DATABASE if explicitly provided in secrets
          if [ ! -z "$DB_DATABASE" ]; then
            echo "Updating DB_DATABASE from secrets..."
            sed -i "s/^DB_DATABASE=.*/DB_DATABASE=$DB_DATABASE/" .env
          fi
          
          # 5. Laravel Optimization
          php artisan config:clear
          php artisan cache:clear
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
      env:
        PUSHER_APP_ID: ${{ secrets.PUSHER_APP_ID }}
        PUSHER_APP_KEY: ${{ secrets.PUSHER_APP_KEY }}
        PUSHER_APP_SECRET: ${{ secrets.PUSHER_APP_SECRET }}
        PUSHER_APP_CLUSTER: ${{ secrets.PUSHER_APP_CLUSTER }}
        DB_DATABASE: ${{ secrets.DB_DATABASE }}
