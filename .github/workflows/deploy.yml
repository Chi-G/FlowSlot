name: Deploy to WhoGoHost

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, gd
        coverage: none

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM Dependencies & Build
      env:
        VITE_PUSHER_APP_KEY: ${{ secrets.PUSHER_APP_KEY }}
        VITE_PUSHER_APP_CLUSTER: ${{ secrets.PUSHER_APP_CLUSTER }}
      run: |
        npm install
        npm run build

    - name: Pre-Deployment Cleanup
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 10m
        script: |
          cd /home/forahiao/public_html/flowslot.forahia.org.ng
          # Remove logs and cache to free up space
          rm -rf storage/logs/*.log
          rm -rf storage/framework/cache/data/*
          rm -rf storage/framework/views/*.php
          rm -rf storage/framework/sessions/*
          rm -rf bootstrap/cache/*.php
          # Remove old builds (to prevent accumulating hashed files)
          rm -rf public/build
          # Remove accidental node_modules if they were synced previously
          rm -rf node_modules

    - name: Sync Files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: ".,!node_modules,!.git,!.github,!.env"
        target: "/home/forahiao/public_html/flowslot.forahia.org.ng"
        strip_components: 0
        rm: false
        timeout: 10m

    - name: Post-Deployment Commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 15m
        envs: PUSHER_APP_ID,PUSHER_APP_KEY,PUSHER_APP_SECRET,PUSHER_APP_CLUSTER,DB_DATABASE
        script: |
          cd /home/forahiao/public_html/flowslot.forahia.org.ng
          
          # 1. Diagnostics & Directory Setup
          echo "Checking environment status..."
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p bootstrap/cache
          chmod -R 775 storage bootstrap/cache
          
          # 3. Basic .env Setup (Manual configuration on server recommended)
          if [ ! -f .env ]; then
            echo "::warning ::.env file NOT FOUND on server! Cloning from .env.example..."
            cp .env.example .env
            echo "Please configure .env manually on cPanel File Manager."
          fi
          
          # 4. Laravel Optimization & Database
          php artisan config:clear
          php artisan cache:clear
          php artisan migrate --force
          php artisan db:seed --class=RoleSeeder --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
      env:
        PUSHER_APP_ID: ${{ secrets.PUSHER_APP_ID }}
        PUSHER_APP_KEY: ${{ secrets.PUSHER_APP_KEY }}
        PUSHER_APP_SECRET: ${{ secrets.PUSHER_APP_SECRET }}
        PUSHER_APP_CLUSTER: ${{ secrets.PUSHER_APP_CLUSTER }}
        DB_DATABASE: ${{ secrets.DB_DATABASE }}
