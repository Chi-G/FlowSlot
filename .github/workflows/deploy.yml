name: Deploy to WhoGoHost

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, gd
        coverage: none

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM Dependencies & Build
      run: |
        npm install
        npm run build

    - name: Pre-Deployment Cleanup
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/forahiao/public_html/flowslot.forahia.org.ng
          # Remove logs and cache to free up space
          rm -rf storage/logs/*.log
          rm -rf storage/framework/cache/data/*
          rm -rf bootstrap/cache/*.php
          # Remove accidental node_modules if they were synced previously
          rm -rf node_modules

    - name: Sync Files via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: ".,!node_modules,!.git,!.github"
        target: "/home/forahiao/public_html/flowslot.forahia.org.ng"
        strip_components: 0
        rm: false

    - name: Post-Deployment Commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.WHOGOHOST_SSH_HOST }}
        username: ${{ secrets.WHOGOHOST_SSH_USER }}
        port: ${{ secrets.WHOGOHOST_SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: PUSHER_APP_ID,PUSHER_APP_KEY,PUSHER_APP_SECRET,PUSHER_APP_CLUSTER
        script: |
          cd /home/forahiao/public_html/flowslot.forahia.org.ng
          
          # Inject secrets into .env if they don't exist
          grep -q "PUSHER_APP_ID" .env || echo "PUSHER_APP_ID=${{ secrets.PUSHER_APP_ID }}" >> .env
          grep -q "PUSHER_APP_KEY" .env || echo "PUSHER_APP_KEY=${{ secrets.PUSHER_APP_KEY }}" >> .env
          grep -q "PUSHER_APP_SECRET" .env || echo "PUSHER_APP_SECRET=${{ secrets.PUSHER_APP_SECRET }}" >> .env
          grep -q "PUSHER_APP_CLUSTER" .env || echo "PUSHER_APP_CLUSTER=${{ secrets.PUSHER_APP_CLUSTER }}" >> .env
          
          # Update values if they already exist (using sed)
          sed -i "s/^BROADCAST_CONNECTION=.*/BROADCAST_CONNECTION=pusher/" .env
          sed -i "s/^DB_DATABASE=.*/DB_DATABASE=flowSlot/" .env
          sed -i "s/^PUSHER_APP_ID=.*/PUSHER_APP_ID=\"${{ secrets.PUSHER_APP_ID }}\"/" .env
          sed -i "s/^PUSHER_APP_KEY=.*/PUSHER_APP_KEY=\"${{ secrets.PUSHER_APP_KEY }}\"/" .env
          sed -i "s/^PUSHER_APP_SECRET=.*/PUSHER_APP_SECRET=\"${{ secrets.PUSHER_APP_SECRET }}\"/" .env
          sed -i "s/^PUSHER_APP_CLUSTER=.*/PUSHER_APP_CLUSTER=\"${{ secrets.PUSHER_APP_CLUSTER }}\"/" .env

          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
